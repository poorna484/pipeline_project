<!DOCTYPE html>

<html>
<head>
<title>DevOps Demo App</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin:0;
    padding:0;
}

.container{
    background:white;
    width:60%;
    margin:120px auto;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

h1{
    color:#2c3e50;
    font-size:40px;
}

p{
    font-size:20px;
    color:#555;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

</style>

<script>
function showMessage(){
    alert("🚀 DevOps CI/CD Pipeline Working Successfully!");
}
</script>

</head>

<body>

<div class="container">

<h1>Welcome to DevOps HTML App</h1>

<p>pipeline assignment completed.</p>

<button onclick="showMessage()">Click Me</button>

</div>

</body>
</html>
